; PlatformIO Project Configuration File
; Doku: https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; USB-Konsole zum PC (Debug/Upload). Der Link zum Raspberry Pi laeuft
; SEPARAT ueber UART2 (Pins siehe include/Config.h) - so stoeren sich
; Debug-Ausgaben und Pi-Protokoll nicht.
monitor_speed = 115200
build_flags = -I lib -I include
build_src_filter = +<mcpTest.cpp>
; ─── Bibliotheken (werden beim Build automatisch installiert) ────────────────
lib_deps =
    adafruit/Adafruit MCP23017 Arduino Library   ; Port-Expander (Io-Schicht)
    adafruit/Adafruit PWM Servo Driver Library    ; Servos ueber PCA9685
    bblanchon/ArduinoJson @ ^7                    ; JSON-Protokoll zum Raspberry Pi
    fastled/FastLED                               ; DiscoLight / WS2813-Strang
    ; ── Sensorik: einkommentieren, sobald die Sensoren angebunden werden ──
    ; paulstoffregen/OneWire
    ; milesburton/DallasTemperature                ; DS18B20 (Temperatur)
    ; claws/BH1750                                 ; Helligkeit
    ; adafruit/Adafruit SHT31 Library              ; Temperatur/Feuchte

; Jedes Modul liegt in einem eigenen Ordner unter lib/. "deep+" sorgt dafuer,
; dass PlatformIO alle Querverweise (z.B. Heizung -> Io) zuverlaessig findet.
lib_ldf_mode = deep+
